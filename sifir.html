<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sifir Adventure - Ayra Delisha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: #fdf2f8;
            touch-action: manipulation;
        }
        .input-box {
            border-bottom: 3px solid #fbcfe8;
            transition: all 0.2s;
        }
        .input-box:focus {
            border-bottom-color: #ec4899;
            outline: none;
            background: #fdf2f8;
        }
        .correct { border-bottom-color: #22c55e !important; background: #f0fdf4; }
        .wrong { border-bottom-color: #ef4444 !important; background: #fef2f2; }
        .btn-check {
            box-shadow: 0 6px 0 #15803d;
        }
        .btn-check:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #15803d;
        }
    </style>
</head>
<body class="min-h-screen p-4 pb-20">

    <!-- Header -->
    <div class="w-full max-w-md mx-auto flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm">
        <div class="text-pink-500 font-bold text-xl">⭐ <span id="stars">0</span></div>
        <div id="title-text" class="text-slate-500 font-bold tracking-wider">Sifir Fun!</div>
        <button onclick="location.reload()" class="text-slate-300 text-xl">🔄</button>
    </div>

    <!-- Sifir Selector View -->
    <div id="selector-view" class="w-full max-w-md mx-auto bg-white rounded-3xl p-6 shadow-lg border-b-8 border-pink-200">
        <h2 class="text-2xl text-center text-pink-600 font-bold mb-6">Pilih Sifir:</h2>
        <div class="grid grid-cols-3 gap-3">
            <script>
                for(let i=1; i<=12; i++) {
                    const colors = ['yellow', 'blue', 'green', 'purple', 'orange', 'pink', 'indigo', 'teal', 'cyan', 'red', 'lime', 'emerald'];
                    const color = colors[i-1] || 'pink';
                    document.write(`
                        <button onclick="startWorksheet(${i})" class="py-4 bg-${color}-100 border-2 border-${color}-400 rounded-2xl font-bold text-${color}-700 text-xl hover:scale-105 transition-transform">${i}</button>
                    `);
                }
            </script>
        </div>
    </div>

    <!-- Worksheet View -->
    <div id="worksheet-view" class="hidden w-full max-w-md mx-auto space-y-3">
        <div class="bg-white rounded-3xl p-6 shadow-xl border-b-8 border-blue-200 mb-6">
            <h3 class="text-center text-blue-500 font-bold text-xl mb-4 underline decoration-dotted">Helaian Kerja Sifir <span id="current-sifir-num"></span></h3>
            
            <div id="questions-container" class="space-y-4">
                <!-- Soalan akan dijana di sini -->
            </div>
        </div>

        <button onclick="checkAll()" class="w-full py-5 bg-green-500 text-white rounded-2xl font-bold text-2xl btn-check mb-4">
            SEMAK JAWAPAN ✔
        </button>

        <div id="final-feedback" class="text-center hidden">
            <div class="bg-white p-6 rounded-3xl shadow-lg border-b-8 border-yellow-400">
                <h2 class="text-3xl font-bold text-yellow-500 mb-2">Hebat! 🎉</h2>
                <p class="text-slate-600 mb-4">Ayra dapat <span id="final-score">0</span> / 20!</p>
                <button onclick="location.reload()" class="bg-pink-500 text-white px-6 py-2 rounded-xl font-bold">Main Lagi</button>
            </div>
        </div>
    </div>

    <script>
        let currentSifir = 1;
        const totalQuestions = 20;

        function startWorksheet(num) {
            currentSifir = num;
            document.getElementById('selector-view').classList.add('hidden');
            document.getElementById('worksheet-view').classList.remove('hidden');
            document.getElementById('current-sifir-num').innerText = num;
            document.getElementById('title-text').innerText = `SIFIR ${num}`;

            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            for (let i = 1; i <= totalQuestions; i++) {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between text-2xl font-bold text-slate-700 p-2 border-b border-slate-50";
                row.innerHTML = `
                    <div class="w-1/3 text-right">${num} x ${i} =</div>
                    <div class="w-1/2">
                        <input type="number" 
                               id="ans-${i}" 
                               data-correct="${num * i}"
                               placeholder="?"
                               class="input-box w-full py-2 px-4 text-center rounded-xl text-pink-500"
                               oninput="this.classList.remove('correct', 'wrong')">
                    </div>
                `;
                container.appendChild(row);
            }
            window.scrollTo(0, 0);
        }

        function checkAll() {
            let correctCount = 0;
            for (let i = 1; i <= totalQuestions; i++) {
                const input = document.getElementById(`ans-${i}`);
                const userAnswer = parseInt(input.value);
                const correctAnswer = parseInt(input.getAttribute('data-correct'));

                if (userAnswer === correctAnswer) {
                    input.classList.add('correct');
                    input.classList.remove('wrong');
                    correctCount++;
                } else {
                    input.classList.add('wrong');
                    input.classList.remove('correct');
                }
            }

            document.getElementById('stars').innerText = correctCount;
            document.getElementById('final-score').innerText = correctCount;
            document.getElementById('final-feedback').classList.remove('hidden');
            
            // Scroll ke bawah untuk lihat keputusan
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });

            if (correctCount === totalQuestions) {
                confettiEffect();
            }
        }

        function confettiEffect() {
            // Animasi ringkas jika semua betul
            const fb = document.getElementById('final-feedback');
            fb.classList.add('animate-bounce');
            setTimeout(() => fb.classList.remove('animate-bounce'), 2000);
        }
    </script>
</body>
</html>
